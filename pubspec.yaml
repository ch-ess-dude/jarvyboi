name: jarvy
description: A personal life tracker — register-based, local-first.
publish_to: none
version: 0.3.1+247

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Database — local-first SQLite via Drift
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Typography
  google_fonts: ^6.2.1

  # AI / networking
  http: ^1.2.0

  # Voice input (local STT, no cloud)
  speech_to_text: ^6.6.0

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
